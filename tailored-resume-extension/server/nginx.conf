# ============================================
# Agentex Nginx Reverse Proxy Configuration
# ============================================
# Place in /etc/nginx/sites-available/agentex
# ln -s /etc/nginx/sites-available/agentex /etc/nginx/sites-enabled/
# Replace YOUR_DOMAIN with your actual domain
# ============================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=agentex:10m rate=10r/s;

# Upstream
upstream agentex_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request limits
    client_max_body_size 5M;
    client_body_timeout 30s;
    send_timeout 60s;
    proxy_read_timeout 60s;

    # Gzip
    gzip on;
    gzip_types application/json text/plain;

    # Health check (no rate limit)
    location /health {
        proxy_pass http://agentex_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # API endpoints
    location / {
        limit_req zone=agentex burst=20 nodelay;

        proxy_pass http://agentex_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS handled by app, but add safety headers
        proxy_hide_header X-Powered-By;
    }

    # Block common attack paths
    location ~ /\. { deny all; }
    location ~ ~$ { deny all; }
}
